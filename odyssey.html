<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>奥德赛计划 · 人生推演</title>
<style>
  :root{
    --bg:#0b1020; --bg2:#131a35; --panel:#171f3d; --panel2:#1e2850;
    --line:#2a3565; --text:#e8ecff; --dim:#9aa3c7; --faint:#6b74a0;
    --ai:#7c9cff; --ai-bg:#1a2247; --me:#ffd479; --me-bg:#3a3220;
    --gold:#ffd479; --teal:#5eead4; --rose:#ff8fa3; --violet:#b794ff;
    --ok:#5eead4; --warn:#ffd479; --bad:#ff8fa3;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    -webkit-font-smoothing:antialiased;overflow:hidden}
  body{display:flex;flex-direction:column;height:100dvh}

  /* 顶部进度区 */
  .topbar{flex:0 0 auto;background:linear-gradient(180deg,var(--bg2),var(--bg));
    border-bottom:1px solid var(--line);padding:12px 16px 10px;z-index:5}
  .top-row{display:flex;align-items:center;gap:10px}
  .brand{display:flex;align-items:center;gap:8px;font-weight:700;letter-spacing:.5px}
  .brand .logo{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--ai),var(--violet));font-size:15px}
  .brand small{color:var(--dim);font-weight:500;font-size:11px;letter-spacing:1px}
  .top-actions{margin-left:auto;display:flex;gap:6px}
  .icon-btn{border:1px solid var(--line);background:var(--panel);color:var(--dim);
    border-radius:9px;padding:6px 10px;font-size:12px;cursor:pointer;transition:.18s;
    display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
  .icon-btn:hover{color:var(--text);border-color:var(--ai);background:var(--panel2)}
  .stage-meta{margin-top:9px;display:flex;align-items:center;gap:10px}
  .stage-name{font-size:13px;color:var(--gold);font-weight:600;white-space:nowrap}
  .progress-wrap{flex:1;height:7px;border-radius:99px;background:#0a0f24;overflow:hidden;
    border:1px solid var(--line)}
  .progress-bar{height:100%;width:0;border-radius:99px;
    background:linear-gradient(90deg,var(--ai),var(--violet),var(--gold));
    transition:width .6s cubic-bezier(.4,0,.2,1);box-shadow:0 0 12px rgba(124,156,255,.5)}
  .stage-dots{display:flex;gap:5px}
  .dot{width:8px;height:8px;border-radius:50%;background:#26305c;transition:.3s}
  .dot.done{background:var(--ai)}
  .dot.active{background:var(--gold);box-shadow:0 0 8px var(--gold);transform:scale(1.3)}

  /* 对话区 */
  .chat{flex:1 1 auto;overflow-y:auto;padding:18px 14px 8px;scroll-behavior:smooth}
  .chat::-webkit-scrollbar{width:6px}
  .chat::-webkit-scrollbar-thumb{background:#2a3565;border-radius:99px}
  .msg{display:flex;gap:10px;margin:0 2px 16px;max-width:760px;margin-left:auto;margin-right:auto;
    animation:fadeUp .4s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .avatar{flex:0 0 auto;width:38px;height:38px;border-radius:11px;display:grid;place-items:center;
    font-size:18px;overflow:hidden}
  .avatar.ai{background:linear-gradient(135deg,#3a4a8c,#6a5acd)}
  .avatar.me{background:linear-gradient(135deg,#5a4a1a,#8a6d20)}
  .bubble{flex:1;min-width:0;line-height:1.62;font-size:15px;word-break:break-word}
  .bubble .who{font-size:11px;color:var(--faint);margin-bottom:3px;letter-spacing:.5px}
  .bubble.ai-text{background:var(--ai-bg);border:1px solid #243063;border-radius:4px 16px 16px 16px;
    padding:11px 14px;color:#dfe5ff}
  .bubble.me-text{background:var(--me-bg);border:1px solid #4a4030;border-radius:16px 4px 16px 16px;
    padding:11px 14px;color:#ffe9b8}
  .msg.me{flex-direction:row-reverse}
  .msg.me .bubble .who{text-align:right}
  .cursor{display:inline-block;width:7px;height:15px;background:var(--ai);margin-left:2px;
    vertical-align:-2px;animation:blink .9s steps(1) infinite;border-radius:1px}
  @keyframes blink{50%{opacity:0}}

  /* 阶段卡片 */
  .stage-card{max-width:560px;margin:6px auto 18px;text-align:center;
    background:linear-gradient(180deg,rgba(124,156,255,.10),rgba(183,148,255,.06));
    border:1px solid #2f3a72;border-radius:16px;padding:16px 18px;animation:fadeUp .5s both}
  .stage-card .tag{font-size:11px;letter-spacing:3px;color:var(--ai);font-weight:700}
  .stage-card h2{margin:7px 0 4px;font-size:20px;color:#fff}
  .stage-card p{margin:0;color:var(--dim);font-size:13px;line-height:1.6}
  .stage-card .tip{margin-top:10px;font-size:12px;color:var(--gold);
    background:rgba(255,212,121,.08);border:1px dashed #6a5a30;border-radius:10px;
    padding:7px 12px;display:inline-block}

  /* 选项区 */
  .options{max-width:760px;margin:4px auto 18px;display:flex;flex-direction:column;gap:9px}
  .opt{background:var(--panel);border:1px solid var(--line);border-radius:13px;
    padding:13px 15px;cursor:pointer;text-align:left;color:var(--text);font-size:14.5px;
    line-height:1.5;transition:.16s;position:relative;animation:fadeUp .35s both}
  .opt:hover{border-color:var(--ai);background:var(--panel2);transform:translateY(-1px);
    box-shadow:0 6px 20px rgba(0,0,0,.3)}
  .opt:active{transform:translateY(0)}
  .opt::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:13px 0 0 13px;
    background:var(--ai);opacity:0;transition:.16s}
  .opt:hover::before{opacity:1}
  .opt .hint{display:block;font-size:11.5px;color:var(--faint);margin-top:3px}
  .opt.locked{opacity:.45;pointer-events:none}

  /* 分数浮窗提示 */
  .float-stat{position:fixed;top:64px;right:14px;display:flex;gap:6px;z-index:8;pointer-events:none}
  .pill{background:rgba(23,31,61,.85);border:1px solid var(--line);border-radius:99px;
    padding:4px 9px;font-size:11px;color:var(--dim);backdrop-filter:blur(6px)}
  .pill b{color:var(--text)}
  .pill .v{color:var(--gold)}

  /* 输入区 */
  .dock{flex:0 0 auto;border-top:1px solid var(--line);background:var(--bg2);
    padding:10px 14px calc(10px + env(safe-area-inset-bottom))}
  .dock-inner{max-width:760px;margin:0 auto;display:flex;gap:9px;align-items:center}
  .dock .hint-text{flex:1;font-size:13px;color:var(--faint)}
  .dock .ghost{background:var(--panel);border:1px solid var(--line);color:var(--dim);
    border-radius:10px;padding:9px 14px;cursor:pointer;font-size:13px;transition:.16s}
  .dock .ghost:hover{color:var(--text);border-color:var(--ai)}

  /* 结局屏 */
  .ending{max-width:680px;margin:10px auto 24px;text-align:center;animation:fadeUp .6s both}
  .ending .badge{display:inline-block;font-size:11px;letter-spacing:4px;font-weight:700;
    padding:5px 14px;border-radius:99px;border:1px solid}
  .ending h1{font-size:28px;margin:14px 0 6px}
  .ending .quote{font-style:italic;color:var(--dim);font-size:14px;margin:0 0 16px;line-height:1.7}
  .ending .summary{background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:18px 20px;text-align:left;font-size:14.5px;line-height:1.75;color:#cdd3f5}
  .ending .stats{display:flex;gap:10px;justify-content:center;margin:16px 0;flex-wrap:wrap}
  .stat-box{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:10px 14px;min-width:92px}
  .stat-box .lab{font-size:11px;color:var(--faint)}
  .stat-box .num{font-size:22px;font-weight:800;margin-top:2px}
  .ending-actions{display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap}
  .btn-primary{background:linear-gradient(135deg,var(--ai),var(--violet));border:none;color:#fff;
    border-radius:12px;padding:11px 22px;font-size:14px;font-weight:600;cursor:pointer;transition:.18s}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(124,156,255,.4)}
  .btn-ghost{background:var(--panel);border:1px solid var(--line);color:var(--text);
    border-radius:12px;padding:11px 22px;font-size:14px;cursor:pointer;transition:.18s}
  .btn-ghost:hover{border-color:var(--ai)}

  /* 抽屉：历史回看 */
  .drawer-mask{position:fixed;inset:0;background:rgba(5,8,20,.6);backdrop-filter:blur(3px);
    z-index:20;opacity:0;pointer-events:none;transition:.3s}
  .drawer-mask.open{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:min(420px,90vw);background:var(--bg2);
    border-left:1px solid var(--line);z-index:21;transform:translateX(100%);transition:.32s cubic-bezier(.4,0,.2,1);
    display:flex;flex-direction:column}
  .drawer.open{transform:none}
  .drawer-head{padding:16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .drawer-head h3{margin:0;font-size:15px;flex:1}
  .drawer-body{flex:1;overflow-y:auto;padding:14px}
  .h-item{font-size:13px;line-height:1.6;margin-bottom:12px;padding:10px 12px;border-radius:10px;
    border:1px solid var(--line)}
  .h-item .stg{font-size:10px;color:var(--gold);letter-spacing:1px;font-weight:700}
  .h-item .q{color:var(--dim);margin:4px 0 4px}
  .h-item .a{color:var(--me)}
  .drawer-empty{color:var(--faint);text-align:center;padding:40px 16px;font-size:13px}

  /* 开场遮罩 */
  .intro{position:fixed;inset:0;z-index:30;background:radial-gradient(120% 120% at 50% 0%,#1a2350,#0b1020 70%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    padding:30px 26px;transition:opacity .5s}
  .intro.hide{opacity:0;pointer-events:none}
  .intro .ring{width:84px;height:84px;border-radius:24px;display:grid;place-items:center;font-size:42px;
    background:linear-gradient(135deg,var(--ai),var(--violet));margin-bottom:22px;
    box-shadow:0 0 50px rgba(124,156,255,.4);animation:pulse 3s ease-in-out infinite}
  @keyframes pulse{50%{transform:scale(1.05);box-shadow:0 0 70px rgba(124,156,255,.6)}}
  .intro h1{font-size:30px;margin:0 0 6px;letter-spacing:2px}
  .intro .sub{color:var(--dim);font-size:14px;max-width:480px;line-height:1.7;margin:0 0 8px}
  .intro .src{color:var(--faint);font-size:11.5px;margin-bottom:26px}
  .intro .start-btn{background:linear-gradient(135deg,var(--ai),var(--violet));border:none;color:#fff;
    border-radius:14px;padding:14px 40px;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;
    box-shadow:0 10px 30px rgba(124,156,255,.35)}
  .intro .start-btn:hover{transform:translateY(-2px);box-shadow:0 14px 40px rgba(124,156,255,.5)}

  @media(max-width:560px){
    .topbar{padding:10px 12px 8px}
    .brand small{display:none}
    .icon-btn{padding:6px 8px;font-size:11px}
    .icon-btn span.lbl{display:none}
    .chat{padding:14px 10px 6px}
    .bubble{font-size:14.5px}
    .opt{font-size:14px;padding:12px 13px}
    .float-stat{display:none}
    .ending h1{font-size:24px}
  }
</style>
</head>
<body>

<!-- 开场 -->
<div class="intro" id="intro">
  <div class="ring">🧭</div>
  <h1>奥德赛计划</h1>
  <p class="sub">斯坦福《Designing Your Life》人生设计工具。<br>别只画一张人生蓝图——画三张。<br>这是一场用对话推演你五种人生的旅程。</p>
  <p class="src">基于「AI推演你的人生·奥德赛计划」文档改编</p>
  <button class="start-btn" id="startBtn">开始推演 →</button>
</div>

<!-- 顶部 -->
<div class="topbar">
  <div class="top-row">
    <div class="brand"><span class="logo">🧭</span><span>奥德赛计划</span><small>ODYSSEY</small></div>
    <div class="top-actions">
      <button class="icon-btn" id="historyBtn">📜<span class="lbl">回看</span></button>
      <button class="icon-btn" id="restartBtn">↻<span class="lbl">重新开始</span></button>
    </div>
  </div>
  <div class="stage-meta">
    <span class="stage-name" id="stageName">准备阶段</span>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="stage-dots" id="stageDots"></div>
  </div>
</div>

<!-- 分数浮窗 -->
<div class="float-stat" id="floatStat">
  <div class="pill">觉醒 <b class="v" id="fsAware">0</b></div>
  <div class="pill">行动 <b class="v" id="fsAction">0</b></div>
  <div class="pill">勇气 <b class="v" id="fsCourage">0</b></div>
</div>

<!-- 对话区 -->
<div class="chat" id="chat"></div>

<!-- 选项区 -->
<div class="options" id="options"></div>

<!-- 底部 -->
<div class="dock">
  <div class="dock-inner">
    <span class="hint-text" id="dockHint">选择下方选项，推进你的奥德赛推演</span>
  </div>
</div>

<!-- 历史抽屉 -->
<div class="drawer-mask" id="drawerMask"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <h3>📜 推演历史</h3>
    <button class="icon-btn" id="closeDrawer">✕</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<script>
/* ===================== 数据：阶段定义 ===================== */
const STAGES = [
  {id:1, name:"准备阶段 · 现状扫描", short:"现状扫描",
   title:"现状扫描", tag:"STAGE 1 / 5",
   desc:"你的生活由四个维度组成：健康、工作、娱乐、爱。大多数人连自己哪里失衡都不知道。",
   tip:"AI的视角比你更冷——它不会安慰你，它只会告诉你真相。"},
  {id:2, name:"阶段二 · 指南针校准", short:"指南针校准",
   title:"指南针校准", tag:"STAGE 2 / 5",
   desc:"你的工作观和人生观如果打架，你做什么决定都会拧巴。",
   tip:"它不是在评判你，它是在帮你把两条线拉到同一张纸上。"},
  {id:3, name:"阶段三 · 三种人生推演", short:"三种人生推演",
   title:"三种人生推演", tag:"STAGE 3 / 5",
   desc:"别只画一张蓝图，画三张。三个版本不是最好、一般、最差，是三条同样值得活的平行路。",
   tip:"模糊的想象不是规划，只是白日梦。"},
  {id:4, name:"阶段四 · 压力测试", short:"压力测试",
   title:"压力测试", tag:"STAGE 4 / 5",
   desc:"三个计划里重复出现的元素，就是你真正在意的东西——这才是你的人生锚点。",
   tip:"大多数人不是不知道想要什么，是不愿意承认每条路都有代价。"},
  {id:5, name:"阶段五 · 原型设计", short:"原型设计",
   title:"原型设计", tag:"STAGE 5 / 5",
   desc:"不要在脑子里选一条路然后all in，用最小成本先试一试。",
   tip:"想开咖啡店？先去当周末兼职咖啡师。这不是准备，这就是开始。"},
];

/* ===================== 数据：对话节点 ===================== */
/* 评分维度：awareness 觉醒 / action 行动 / courage 勇气 */
const D = {
  s1_intro:{speaker:'ai', stage:1, text:[
    "我是你的奥德赛向导。接下来60分钟，我会带你完成斯坦福的人生设计。",
    "我们不靠运气活着。现在，先扫描你的现状——你的生活由四个维度组成：**健康、工作、娱乐、爱**。",
    "先说健康吧：你的身体、睡眠、情绪，最近怎么样？别美化，说真话。"
  ], options:[
    {text:"还行吧，偶尔熬熬夜，没什么大事。", hint:"典型的自我安慰", next:'s1_h_fake', eff:{awareness:-1}},
    {text:"说实话，长期失眠，情绪也常低落。", hint:"诚实面对", next:'s1_h_real', eff:{awareness:+2, courage:+1}},
    {text:"挺好，我每天健身，状态在线。", hint:"状态在线", next:'s1_h_good', eff:{awareness:+1}},
  ]},

  s1_h_fake:{speaker:'ai', text:[
    "「偶尔熬夜，没什么大事」——这是我听过最多的谎言。",
    "年薪百万但长期失眠的人，工作9分健康3分，他从不说这是问题。",
    "⚠️ 注意：如果你某个维度说不出几句话，那个维度大概率已经出问题了。"
  ], options:[
    {text:"好吧……我确实一直在装作没事。", hint:"承认失衡", next:'s1_work', eff:{awareness:+2}},
    {text:"没那么严重吧，你别吓我。", hint:"仍在回避", next:'s1_work', eff:{awareness:-1}},
  ]},
  s1_h_real:{speaker:'ai', text:[
    "谢谢你的诚实。能说出「长期失眠」这四个字的人，比假装没事的人离真相近得多。",
    "记住这个3分的健康——它会影响后面所有的判断。"
  ], options:[
    {text:"嗯，继续。我想看清工作那块。", hint:"继续扫描", next:'s1_work', eff:{awareness:+1}},
  ]},
  s1_h_good:{speaker:'ai', text:[
    "健康9分，很好。但别忘了问我下一个问题：你的「娱乐」是不是只剩刷手机？",
    "我们先看工作。"
  ], options:[
    {text:"看工作吧。", hint:"继续", next:'s1_work'},
  ]},

  s1_work:{speaker:'ai', text:[
    "工作维度——收入、成长、满意度。你现在的工作，给你的是燃料，还是只是消耗？"
  ], options:[
    {text:"收入不错，但每天都在重复，没什么成长。", hint:"高薪低成长", next:'s1_play', eff:{awareness:+1}},
    {text:"我在做的事让我兴奋，钱不是首要的。", hint:"成长驱动", next:'s1_play', eff:{awareness:+1, courage:+1}},
    {text:"就那样吧，有份工打而已，没想过那么多。", hint:"麻木", next:'s1_play', eff:{awareness:-1}},
  ]},

  s1_play:{speaker:'ai', text:[
    "娱乐维度——你有纯粹享受、不为任何目的去做的事吗？",
    "注意，「刷短视频」不算。那不是娱乐，那是麻醉。"
  ], options:[
    {text:"有，我每周都去爬山/画画/弹琴，纯粹喜欢。", hint:"真娱乐", next:'s1_love', eff:{awareness:+1}},
    {text:"……好像真没有。下班就累瘫刷手机。", hint:"娱乐缺失", next:'s1_love', eff:{awareness:+2}},
  ]},

  s1_love:{speaker:'ai', text:[
    "最后一个维度——爱。家人、朋友、亲密关系。",
    "你最近一次感到「被人真正看见」，是什么时候？"
  ], options:[
    {text:"想不起来了。身边人很多，但都走不近。", hint:"关系空心", next:'s1_sum', eff:{awareness:+2}},
    {text:"上周和老友深聊了一整晚。", hint:"关系滋养", next:'s1_sum', eff:{awareness:+1}},
    {text:"我习惯一个人，不太需要这些。", hint:"回避关系", next:'s1_sum', eff:{awareness:-1, courage:-1}},
  ]},

  s1_sum:{speaker:'ai', text:[
    "好，四个维度扫描完毕。",
    "我看到了一个失衡点：你高估了自己的「还行」，低估了那些「说不出话」的维度。",
    "现状扫描不是让你自责，是让你知道——**你不是从零开始，你是从一个失衡的点开始。**",
    "带着这份清醒，我们去校准你的指南针。"
  ], options:[
    {text:"继续，进入指南针校准。", hint:"阶段二", next:'__stage2__'},
  ]},

  /* ===== 阶段2 ===== */
  s2_intro:{speaker:'ai', stage:2, text:[
    "指南针有两根针：工作观，和人生观。",
    "它们如果指向不同方向，你永远在拧巴地走。选自由会焦虑，选安全会不甘。",

/* ===================== DOM ===================== */
const $chat=document.getElementById('chat');
const $opts=document.getElementById('options');
const $stageName=document.getElementById('stageName');
const $bar=document.getElementById('progressBar');
const $dots=document.getElementById('stageDots');

const $fsA=document.getElementById('fsAware');
const $fsC=document.getElementById('fsAction');
const $fsG=document.getElementById('fsCourage');

/* 初始化阶段点 */
function buildDots(){
  $dots.innerHTML='';
  STAGES.forEach((_,i)=>{
    const d=document.createElement('div');d.className='dot';$dots.appendChild(d);
  });
}
buildDots();
function updateDots(){
  [...$dots.children].forEach((d,i)=>{
    d.classList.remove('done','active');
    if(i<state.stage) d.classList.add('done');
    if(i===state.stage) d.classList.add('active');
  });
}
function updateProgress(){
  // 进度按已完成的阶段 + 当前节点推进感
  const base = state.done ? 100 : (state.stage / STAGES.length)*100;
  $bar.style.width = base + '%';
}

/* ===================== 渲染：阶段卡片 ===================== */
function showStageCard(idx){
  const s = STAGES[idx];
  const el=document.createElement('div');
  el.className='stage-card';
  el.innerHTML=`<div class="tag">${s.tag}</div>
    <h2>${s.title}</h2>
    <p>${s.desc}</p>
    <div class="tip">💡 ${s.tip}</div>`;
  $chat.appendChild(el);
  $stageName.textContent = s.short;
  scrollToBottom();
}

/* ===================== 渲染：消息 ===================== */
function addAiMsg(text, withCursor=true){
  return new Promise(res=>{
    const wrap=document.createElement('div');wrap.className='msg';
    wrap.innerHTML=`<div class="avatar ai">🧭</div>
      <div class="bubble"><div class="who">奥德赛向导</div>
      <div class="ai-text"></div></div>`;
    $chat.appendChild(wrap);
    const tgt=wrap.querySelector('.ai-text');
    typeText(tgt, text, withCursor).then(()=>{wrap.querySelector('.cursor')?.remove();res();});
  });
}
function addMeMsg(text){
  const wrap=document.createElement('div');wrap.className='msg me';
  wrap.innerHTML=`<div class="avatar me">🧑</div>
    <div class="bubble"><div class="who">你</div>
    <div class="me-text"></div></div>`;
  $chat.appendChild(wrap);
  wrap.querySelector('.me-text').textContent=text;
  scrollToBottom();
}

/* 打字机 */
function typeText(el, text, withCursor){
  return new Promise(res=>{
    state.typing=true;
    state.skip=false; // 每条消息开始时重置跳过标记
    let i=0;
    const render=()=>{
      let cur=text.slice(0,i);
      el.innerHTML=cur.replace(/\*\*(.+?)\*\*/g,'<b style="color:#fff">$1</b>')
                      .replace(/\n/g,'<br>');
      if(withCursor && i<text.length){const c=document.createElement('span');c.className='cursor';el.appendChild(c);}
      else if(withCursor){el.querySelector('.cursor')?.remove();}
    };
    render();
    const tick=()=>{
      i++;
      if(i>text.length){state.typing=false;el.querySelector('.cursor')?.remove();res();return;}
      render();
      const ch=text[i-1];
      const delay = state.skip?0 : (/[，。！？、；：\n]/.test(ch)?160 : (Math.random()*22+22));
      setTimeout(tick, delay);
    };
    tick();
  });
}

function scrollToBottom(){
  $chat.scrollTop=$chat.scrollHeight;
}

/* ===================== 渲染选项 ===================== */
function showOptions(opts, onPick){
  $opts.innerHTML='';
  opts.forEach((o,idx)=>{
    const b=document.createElement('button');
    b.className='opt';
    b.style.animationDelay=(idx*0.08)+'s';
    b.innerHTML=o.text + (o.hint?`<span class="hint">▸ ${o.hint}</span>`:'');
    b.onclick=()=>{
      if(state.typing) return;
      [...$opts.children].forEach(c=>c.classList.add('locked'));
      onPick(o);
    };
    $opts.appendChild(b);
  });
}

/* ===================== 分数 ===================== */
function applyEff(eff){
  if(!eff) return;
  for(const k in eff){ state.scores[k]+=eff[k]; }
  $fsA.textContent=state.scores.awareness;
  $fsC.textContent=state.scores.action;
  $fsG.textContent=state.scores.courage;
}

/* ===================== 主流程：进入节点 ===================== */
async function gotoNode(id){
  state.cur=id;

  // 特殊控制节点
  if(id==='__stage2__') return enterStage(1);
  if(id==='__stage3__') return enterStage(2);
  if(id==='__stage4__') return enterStage(3);
  if(id==='__stage5__') return enterStage(4);
  if(id==='__ending__') return showEnding();

  const node=D[id];
  if(!node){console.error('node not found',id);return;}

  // 阶段切换
  if(node.stage && node.stage-1!==state.stage){
    state.stage=node.stage-1;
    showStageCard(state.stage);
    updateDots();updateProgress();
    await wait(500);
  }

  // 显示AI消息（可能多句）
  $opts.innerHTML='';
  $dockHint.textContent='向导正在说话……';
  const lines = Array.isArray(node.text)?node.text:[node.text];
  for(let i=0;i<lines.length;i++){
    await addAiMsg(lines[i], i===lines.length-1);
    await wait(280);
  }

  // 显示选项
  if(node.options && node.options.length){
    $dockHint.textContent='选择下方选项，推进推演';
    showOptions(node.options, async (o)=>{
      addMeMsg(o.text);
      // 记录历史
      state.history.push({
        stage: STAGES[state.stage]?.short || '开场',
        q: lines[lines.length-1],  // 最后一句作为问题
        a: o.text
      });
      applyEff(o.eff);
      await wait(420);
      gotoNode(o.next);
    });
  } else {
    $dockHint.textContent='—';
  }
}

function enterStage(stageIdx){
  state.stage=stageIdx;
  showStageCard(stageIdx);
  updateDots();updateProgress();
  // 阶段首节点
  const firstNode = {
    1:'s1_intro',2:'s2_intro',3:'s3_intro',4:'s4_intro',5:'s5_intro'
  }[stageIdx+1];
  wait(500).then(()=>gotoNode(firstNode));
}

function wait(ms){return new Promise(r=>setTimeout(r,ms));}

/* ===================== 结局 ===================== */
function showEnding(){
  state.done=true;
  updateProgress();
  $opts.innerHTML='';
  $dockHint.textContent='推演完成';
  const e = endings(state.scores);
  const el=document.createElement('div');
  el.className='ending';
  el.innerHTML=`
    <div class="badge" style="color:${e.color};border-color:${e.color}">${e.badge}</div>
    <h1 style="color:${e.color}">${e.title}</h1>
    <p class="quote">${e.quote}</p>
    <div class="stats">
      <div class="stat-box"><div class="lab">觉醒</div><div class="num" style="color:#b794ff">${state.scores.awareness}</div></div>
      <div class="stat-box"><div class="lab">行动</div><div class="num" style="color:#5eead4">${state.scores.action}</div></div>
      <div class="stat-box"><div class="lab">勇气</div><div class="num" style="color:#ffd479">${state.scores.courage}</div></div>
    </div>
    <div class="summary">${e.body.map(p=>'<p style="margin:0 0 10px">'+p+'</p>').join('')}</div>
    <div class="ending-actions">
      <button class="btn-primary" id="restartBtn2">↻ 重新推演</button>
      <button class="btn-ghost" id="histBtn2">📜 回看历史</button>
    </div>`;
  $chat.appendChild(el);
  scrollToBottom();
  document.getElementById('restartBtn2').onclick=restart;
  document.getElementById('histBtn2').onclick=openDrawer;
}

/* ===================== 重新开始 ===================== */
function restart(){
  state={cur:'s1_intro',stage:0,scores:{awareness:0,action:0,courage:0},history:[],typing:false,done:false};
  $chat.innerHTML='';$opts.innerHTML='';
  $fsA.textContent=0;$fsC.textContent=0;$fsG.textContent=0;
  enterStage(0);
}

/* ===================== 历史抽屉 ===================== */
function openDrawer(){
  const body=document.getElementById('drawerBody');
  if(!state.history.length){
    body.innerHTML='<div class="drawer-empty">还没有推演记录。<br>开始选择后，这里会记录你的每个关键抉择。</div>';
  } else {
    body.innerHTML = state.history.map(h=>`
      <div class="h-item">
        <div class="stg">${h.stage}</div>
        <div class="q">❓ ${h.q}</div>
        <div class="a">→ ${h.a}</div>
      </div>`).join('');
  }
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerMask').classList.add('open');
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerMask').classList.remove('open');
}

/* ===================== 事件绑定 ===================== */
document.getElementById('startBtn').onclick=()=>{
  document.getElementById('intro').classList.add('hide');
  setTimeout(()=>{document.getElementById('intro').style.display='none';},500);
  enterStage(0);
};
document.getElementById('restartBtn').onclick=()=>{
  if(state.history.length===0 && !state.done) return;
  restart();
};
document.getElementById('historyBtn').onclick=openDrawer;
document.getElementById('closeDrawer').onclick=closeDrawer;
document.getElementById('drawerMask').onclick=closeDrawer;

// 点击对话区跳过打字
$chat.addEventListener('click',()=>{
  if(state.typing){state.skip=true;}
});
</script>
</body>
